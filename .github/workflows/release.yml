name: Build and Release DubMux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tagName:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Download FFmpeg portable build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "tools" | Out-Null
          $zipPath = "tools/ffmpeg.zip"
          $extractPath = "tools/ffmpeg"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          $ffmpegPath = Get-ChildItem -Path $extractPath -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1 -ExpandProperty FullName
          $ffprobePath = Get-ChildItem -Path $extractPath -Recurse -Filter "ffprobe.exe" | Select-Object -First 1 -ExpandProperty FullName

          if (-not $ffmpegPath -or -not $ffprobePath) {
            throw "Failed to locate ffmpeg.exe or ffprobe.exe in downloaded archive"
          }

          Copy-Item $ffmpegPath -Destination "src-tauri/bin/ffmpeg.exe" -Force
          Copy-Item $ffprobePath -Destination "src-tauri/bin/ffprobe.exe" -Force

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tagName || github.ref_name }}
          releaseName: DubMux ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tagName || github.ref_name }}
          releaseBody: |
            Automated DubMux release.

            Downloads:
            - Windows installer (.exe)
          releaseDraft: false
          prerelease: false
